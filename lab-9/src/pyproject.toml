# pyproject.toml

[tool.black]
line-length = 88
target-version = ['py310']

[tool.pylint.messages_control]
disable = [
    "C0114", # missing-module-docstring
    "C0115", # missing-class-docstring
    "R0903", # too-few-public-methods
]

[tool.mypy]
python_version = "3.10"
disallow_untyped_defs = true
ignore_missing_imports = true